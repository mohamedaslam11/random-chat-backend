<!DOCTYPE html>
<html>
<head>
    <title>Random Chat Pro</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background: #020617;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        #status {
            text-align: center;
            padding: 10px;
            background: #1e293b;
        }

        #chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 10px;
        }

        #messages {
            flex: 1;
            background: #020617;
            padding: 10px;
            overflow-y: auto;
            border-radius: 10px;
        }

        .msg {
            margin: 5px 0;
        }

        .you {
            color: #22c55e;
        }

        .stranger {
            color: #38bdf8;
        }

        #input-area {
            display: flex;
            margin-top: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
        }

        button {
            padding: 12px;
            margin-left: 5px;
            border: none;
            border-radius: 5px;
            background: #3b82f6;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #2563eb;
        }

        #controls {
            display: flex;
            justify-content: center;
            padding: 10px;
            background: #020617;
        }

        #controls button {
            margin: 5px;
        }

    </style>

</head>
<body>

<header>
Random Chat Pro
</header>

<div id="status">
Status: Not connected
</div>

<div id="chat-container">

<div id="messages"></div>

<div id="input-area">
<input id="msg" placeholder="Type a message...">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<div id="controls">
<button onclick="startChat()">Start</button>
<button onclick="nextChat()">Next</button>
</div>

<script src="http://localhost:3000/socket.io/socket.io.js"></script>

<script>

let socket = io("http://localhost:3000");

let status = document.getElementById("status");

socket.on("waiting", () => {
    status.innerText = "Status: Waiting for stranger...";
});

socket.on("matched", () => {
    status.innerText = "Status: Connected";
    addMessage("System: Connected to stranger");
});

socket.on("message", (msg) => {
    addMessage("Stranger: " + msg, "stranger");
});

socket.on("disconnected", () => {
    status.innerText = "Status: Disconnected";
    addMessage("System: Stranger disconnected");
});

function startChat() {
    socket.emit("start");
}

function nextChat() {
    socket.emit("start");
}

function sendMessage() {

    let input = document.getElementById("msg");
    let msg = input.value;

    if(msg.trim() === "") return;

    addMessage("You: " + msg, "you");

    socket.emit("message", msg);

    input.value = "";

}

function addMessage(text, type="system") {

    let div = document.createElement("div");

    div.classList.add("msg");

    if(type === "you") div.classList.add("you");
    if(type === "stranger") div.classList.add("stranger");

    div.innerText = text;

    document.getElementById("messages").appendChild(div);

}

</script>

</body>
</html>
